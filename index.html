<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css"/>
  <script src="utils.js"></script>
</head>

<body onload="iniciarJuego()">

  <div class="ui-container">

    <header class="titulo">
      <h1>CAZANDO</h1>
      <p class="autor">Diego Chicaiza</p>
    </header>

    <!-- LAYOUT PRINCIPAL -->
    <div class="layout">

      <!-- IZQUIERDA (CANVAS) -->
      <div class="zona-juego">
        <div class="game-frame">
          <canvas id="areaJuego" width="500" height="500"></canvas>
        </div>
      </div>

      <!-- DERECHA -->
      <div class="zona-ui">

        <!-- HUD ARRIBA -->
        <div class="hud">
          <div class="hud-box">
            <span>PUNTOS</span>
            <span id="txtPuntos">0</span>
          </div>

          <div class="hud-box">
            <span>TIEMPO</span>
            <span id="txtTiempo">15</span>
          </div>
        </div>

        <!-- CONTROLES CENTRADOS -->
        <div class="controles">

          <div class="fila">
            <button onclick="moverArriba()">▲</button>
          </div>

          <div class="fila">
            <button onclick="moverIzquierda()">◀</button>
            <button class="btn-reiniciar" onclick="reiniciar()">⟳</button>
            <button onclick="moverDerecha()">▶</button>
          </div>

          <div class="fila">
            <button onclick="moverAbajo()">▼</button>
          </div>

        </div>

      </div>

    </div>

    <p id="mensaje"></p>

  </div>

  <script src="cazando.js"></script>
</body>
<div class="fondo">
  <img src="gaming.png" alt="fondo gaming">
</div>
</html>
